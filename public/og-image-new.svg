<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="1100" cy="100" r="200" fill="#6366f1" opacity="0.1"/>
  <circle cx="100" cy="530" r="150" fill="#8b5cf6" opacity="0.1"/>
  <circle cx="600" cy="315" r="350" fill="url(#accent)" opacity="0.03"/>
  
  <!-- Accent line -->
  <rect x="100" y="280" width="80" height="4" rx="2" fill="url(#accent)"/>
  
  <!-- Name -->
  <text x="100" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#ffffff">
    Sebastian Rojas
  </text>
  
  <!-- Title -->
  <text x="100" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#a1a1aa">
    Fullstack Web Developer
  </text>
  
  <!-- Stack -->
  <text x="100" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#71717a">
    PHP / Laravel • React • Vue • Angular
  </text>
  
  <!-- Contact -->
  <text x="100" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#6366f1">
    srojasweb.dev
  </text>
  
  <!-- Avatar placeholder - circle with initials -->
  <circle cx="1000" cy="250" r="120" fill="#27272a"/>
  <text x="1000" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#6366f1" text-anchor="middle">
    SR
  </text>
  
  <!-- Small tech badges -->
  <rect x="850" y="400" width="100" height="28" rx="14" fill="#27272a"/>
  <text x="900" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a1a1aa" text-anchor="middle">Laravel</text>
  
  <rect x="960" y="400" width="80" height="28" rx="14" fill="#27272a"/>
  <text x="1000" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a1a1aa" text-anchor="middle">React</text>
  
  <rect x="1050" y="400" width="80" height="28" rx="14" fill="#27272a"/>
  <text x="1090" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a1a1aa" text-anchor="middle">Vue</text>
</svg>